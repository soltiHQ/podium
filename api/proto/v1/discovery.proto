syntax = "proto3";

package solti.discover.v1;

option go_package = "github.com/soltiHQ/control-plane/api/gen/v1;genv1";

service DiscoverService {
  // Sync is invoked periodically by agent to report their status.
  rpc Sync(SyncRequest) returns (SyncResponse);
}

// EndpointType describes the transport protocol an agent exposes.
enum EndpointType {
  ENDPOINT_TYPE_UNSPECIFIED = 0;
  ENDPOINT_TYPE_GRPC        = 1;
  ENDPOINT_TYPE_HTTP        = 2;
}

message SyncRequest {
  // Unique agent identifier.
  string id = 1;
  // Agent name.
  string name = 2;
  // Where control plane can reach this agent.
  string endpoint = 3;
  // Seconds since start.
  int64 uptime_seconds = 4;
  // Operating system (e.g. "ubuntu", "debian").
  string os = 5;
  // Architecture (e.g. "amd64", "arm64").
  string arch = 6;
  // Platform ("linux", "macos").
  string platform = 7;
  // Unix timestamp when message was sent.
  int64 ts = 8;
  // Metadata provided by the agent.
  map<string, string> metadata = 9;
  // Transport type for the agent endpoint.
  EndpointType endpoint_type = 10;
  // API protocol version the agent supports (1 = v1).
  int32 api_version = 11;
  // Agent-reported heartbeat interval in seconds.
  int32 heartbeat_interval_s = 12;
  // Agent capabilities — features the agent supports beyond the base API.
  // Known values: "task_runs", "task_delete".
  // The control-plane uses this to decide which RPCs are safe to call.
  repeated string capabilities = 13;
}

message SyncResponse {
  // Indicates success or failure.
  bool success = 1;
  // Reason when success = false.
  string reason = 2;
  // Server-suggested backoff before next sync attempt (seconds).
  // 0 = unspecified — client falls back to its configured backoff.
  int32 retry_after_s = 3;
}
