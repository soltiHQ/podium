syntax = "proto3";

package solti.v1;

option go_package = "github.com/soltiHQ/control-plane/api/gen/v1;genv1";

import "v1/types.proto";

// SoltiApi provides task management on the agent side.
// The control-plane acts as a client calling into the agent.
service SoltiApi {
  // Submit a new task for execution.
  rpc SubmitTask(SubmitTaskRequest) returns (SubmitTaskResponse);

  // Get current task status by ID.
  rpc GetTaskStatus(GetTaskStatusRequest) returns (GetTaskStatusResponse);

  // Query tasks with combined filters and pagination.
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);

  // List execution history for a specific task.
  rpc ListTaskRuns(ListTaskRunsRequest) returns (ListTaskRunsResponse);

  // Stop a task and purge its run history. Idempotent: succeeds
  // whether or not the task is currently registered on the agent —
  // gone is gone, not an error. This is the single teardown primitive;
  // "cancel without purge" is not exposed because taskvisor has no
  // concept of a paused task anyway (cancel = final on its side).
  rpc DeleteTask(DeleteTaskRequest) returns (DeleteTaskResponse);

  // Subscribe to the live-tail stream of stdout/stderr events for a task.
  // Server-streaming RPC: one subscription covers all retries of the task,
  // with explicit run-boundary markers. The agent never persists output —
  // late subscribers receive only events that are still in the broadcast
  // ring; missed events are signaled via LaggedProto.
  rpc StreamTaskLogs(StreamTaskLogsRequest) returns (stream OutputEventProto);
}

// --- SubmitTask ---

message SubmitTaskRequest {
  CreateSpec spec = 1;
}

message SubmitTaskResponse {
  string task_id = 1;
}

// --- GetTaskStatus ---

message GetTaskStatusRequest {
  string task_id = 1;
}

message GetTaskStatusResponse {
  optional TaskData task = 1;
}

// --- ListTasks ---

message ListTasksRequest {
  optional string slot       = 1;
  optional TaskStatus status = 2;
  uint32 limit               = 3; // 0 = default (100), max 1000.
  uint32 offset              = 4; // default 0.
}

message ListTasksResponse {
  repeated TaskData tasks = 1;
  uint32 total            = 2;
}

// --- ListTaskRuns ---

message ListTaskRunsRequest {
  string task_id = 1;
}

message ListTaskRunsResponse {
  repeated TaskRunInfo runs = 1;
}

// --- DeleteTask ---

message DeleteTaskRequest {
  string task_id = 1;
}

message DeleteTaskResponse {}

// --- StreamTaskLogs ---

message StreamTaskLogsRequest {
  string task_id = 1;
}

enum OutputStreamKind {
  OUTPUT_STREAM_KIND_UNSPECIFIED = 0;
  OUTPUT_STREAM_KIND_STDOUT      = 1;
  OUTPUT_STREAM_KIND_STDERR      = 2;
}

message OutputChunkProto {
  uint32 attempt          = 1; // which run attempt produced this line
  OutputStreamKind stream = 2; // stdout or stderr
  uint64 seq              = 3; // monotonic, per-stream, resets each attempt
  int64  ts               = 4; // unix milliseconds when the agent read it
  bytes  line             = 5; // truncated/cleaned line content (UTF-8)
}

message RunStartedProto {
  uint32 attempt    = 1;
  int64  started_at = 2; // unix milliseconds
}

// Current run finished. Consumers can stop accumulating chunks for this attempt.
message RunFinishedProto {
  uint32 attempt           = 1;
  optional int32 exit_code = 2;
  int64  finished_at       = 3; // unix milliseconds
}

// Subscriber fell behind the broadcast ring window.
message LaggedProto {
  uint64 skipped = 1; // number of events the subscriber missed
}

// Tagged wrapper — one of the four variants is set per stream item.
message OutputEventProto {
  oneof kind {
    OutputChunkProto chunk        = 1;
    RunStartedProto  run_started  = 2;
    RunFinishedProto run_finished = 3;
    LaggedProto      lagged       = 4;
  }
}
