# Solti Control Plane — example configuration.
#
# Launch: ./podium --config config.yaml
#
# Every value shown below is the built-in default.
# Omitted fields inherit defaults from withDefaults().
# Environment variables (SOLTI_ prefix) override file values.

http:
  name: http
  addr: ":8080"
  # read_header_timeout: 10s
  # read_timeout: 30s
  # write_timeout: 30s
  # idle_timeout: 60s
  # max_header_bytes: 16384

http_discovery:
  name: http-discovery
  addr: ":8082"

grpc:
  name: grpc-discovery
  addr: ":50051"
  # network: tcp

auth:
  jwt_secret: "CHANGE-ME-IN-PRODUCTION"
  # audience: control-plane
  # issuer: solti
  # access_ttl: 15m
  # refresh_ttl: 168h
  # rate_window: 1m
  # rate_attempts: 5
  # rotate_refresh: false

cors:
  allow_origins:
    - "*"
  # allow_credentials: false
  # max_age: 12h

