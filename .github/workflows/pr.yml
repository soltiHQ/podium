name: Pr

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

permissions: {
  contents: read,
  actions: write,
  pull-requests: read
}

jobs:
  label-check:
    name: Label check
    uses: ./.github/workflows/.label-check.yml

  prepare:
    name: Prepare
    needs: label-check
    uses: ./.github/workflows/.vendor.yml

  build:
    name: Build
    needs: prepare
    uses: ./.github/workflows/.build.yml

  pr-check:
    name: Pr Check
    needs: [label-check, build]
    runs-on: ${{ vars.RUNS_ON }}
    steps:
      - name: All checks passed
        run: echo "All Pr checks completed successfully!"