name: Pr

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

permissions: {
  contents: read,
  actions: write
}

jobs:
  vendor:
    name: Vendor
    uses: ./.github/workflows/.vendor.yml

  build:
    name: Build
    needs: vendor
    uses: ./.github/workflows/.build.yml

  pr-check:
    name: Pr Check
    needs: [build]
    runs-on: ${{ vars.RUNS_ON }}
    steps:
      - name: All checks passed
        run: echo "All Pr checks completed successfully!"